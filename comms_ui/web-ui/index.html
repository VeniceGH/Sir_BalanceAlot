<!DOCTYPE html>
<html>
<head>
  <title>Sir BalanceAlot Dashboard</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="stylesheet" href="style.css?build=20">
</head>
<body>
  <h1>Sir BalanceAlot Dashboard</h1>

  <p id="status">Connecting...</p>

  <div class="cards">
    <div class="card">Angle: <span id="angle">--</span>°</div>
    <div class="card">Gyro: <span id="gyro">--</span>°/s</div>
    <div class="card">Left Motor: <span id="left">--</span></div>
    <div class="card">Right Motor: <span id="right">--</span></div>
    <div class="card">Battery: <span id="battery">--</span> V</div>
    <div class="card">Mode: <span id="mode">--</span></div>
  </div>

  <div class="camera-section">
    <h2>Robot Camera Feed</h2>

    <div class="camera-box">
      <img id="camera-feed" src="/camera-feed" alt="Live robot camera feed">
    </div>

    <p class="camera-note">Showing the robot's forward-facing camera view.</p>
  </div>

  <div class="controls">
    <h2>Manual Controls</h2>

    <div class="gamepad">
      <button
        class="control-btn forward"
        title="Move the robot forward"
        onmousedown="sendCommand('FORWARD')"
        onmouseup="sendCommand('STOP')"
        onmouseleave="sendCommand('STOP')"
        ontouchstart="sendCommand('FORWARD')"
        ontouchend="sendCommand('STOP')">
        ▲
      </button>

      <button
        class="control-btn turn-left"
        title="Turn the robot left"
        onmousedown="sendCommand('LEFT')"
        onmouseup="sendCommand('STOP')"
        onmouseleave="sendCommand('STOP')"
        ontouchstart="sendCommand('LEFT')"
        ontouchend="sendCommand('STOP')">
        ↶
      </button>

      <button
        class="control-btn stop"
        title="Stop all movement but keep the robot enabled"
        onclick="sendCommand('STOP')">
        Stop
      </button>

      <button
        class="control-btn turn-right"
        title="Turn the robot right"
        onmousedown="sendCommand('RIGHT')"
        onmouseup="sendCommand('STOP')"
        onmouseleave="sendCommand('STOP')"
        ontouchstart="sendCommand('RIGHT')"
        ontouchend="sendCommand('STOP')">
        ↷
      </button>

      <button
        class="control-btn backward"
        title="Move the robot backward"
        onmousedown="sendCommand('BACKWARD')"
        onmouseup="sendCommand('STOP')"
        onmouseleave="sendCommand('STOP')"
        ontouchstart="sendCommand('BACKWARD')"
        ontouchend="sendCommand('STOP')">
        ▼
      </button>
    </div>

    <div class="system-controls">
      <button onclick="sendMode('manual')">
        <span class="btn-title">Manual</span>
        <span class="btn-desc">Enable manual control</span>
      </button>

      <button onclick="sendMode('line_follow')">
        <span class="btn-title">Line Follow</span>
        <span class="btn-desc">Enable line following mode</span>
      </button>

      <button class="estop" onclick="sendCommand('ESTOP')">
        <span class="btn-title">Emergency Stop</span>
        <span class="btn-desc">Disable motors</span>
      </button>
    </div>
  </div>

  <script src="app.js?build=20"></script>
</body>
</html>
